[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "papayya"
version = "0.1.0"
description = "Durable background jobs for AI agents"
readme = "README.md"
requires-python = ">=3.10"
license = "MIT"
dependencies = [
    "httpx>=0.27,<1",
    "click>=8,<9",
]

[project.scripts]
papayya = "papayya.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/papayya"]
